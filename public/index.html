<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1f13" />
    <meta name="description" content="Synata — An Islamic companion for healing, accessibility and mental wellness" />
    <title>Synata — Your Islamic Wellness Companion</title>

    <!-- Accessibility -->
    <meta name="color-scheme" content="dark" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 16px; }
      body {
        background: #0d1f13;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      /* High contrast scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0d1f13; }
      ::-webkit-scrollbar-thumb { background: #2d6a4f; border-radius: 3px; }

      /* Skip to content for screen readers */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 0;
        background: #c9a84c;
        color: #0d1f13;
        padding: 12px 20px;
        z-index: 9999;
        font-weight: 600;
        border-radius: 0 0 8px 0;
        transition: top 0.2s;
      }
      .skip-link:focus { top: 0; }

      /* Focus visible for keyboard navigation */
      *:focus-visible {
        outline: 3px solid #c9a84c;
        outline-offset: 3px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <noscript>
      <div style="padding:40px;text-align:center;color:#c9a84c;font-family:sans-serif;background:#0d1f13;min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <div>
          <h1 style="margin-bottom:16px;">Synata requires JavaScript</h1>
          <p>Please enable JavaScript in your browser to use Synata.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
